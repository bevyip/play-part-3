<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@600&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="app">
    <main class="viewport">
      <div class="spread-shell">
        <canvas id="spread" width="1280" height="720" aria-label="Book spread with reflowing text"></canvas>
      </div>
    </main>
    <nav class="toolbar" aria-label="Drawing and file tools">
      <div class="toolbar-cluster toolbar-cluster--main">
        <div class="tool-group tool-group--brushes" role="group" aria-label="Brush type">
          <button type="button" class="tool-btn active" data-tool="pen" title="Pen">
            <img class="tool-icon" src="/pen.svg" width="24" height="24" alt="" draggable="false" aria-hidden="true" />
            <span class="sr-only">Pen</span>
          </button>
          <button type="button" class="tool-btn" data-tool="marker" title="Marker">
            <img class="tool-icon" src="/marker.svg" width="24" height="24" alt="" draggable="false" aria-hidden="true" />
            <span class="sr-only">Marker</span>
          </button>
          <button type="button" class="tool-btn" data-tool="brush" title="Calligraphy brush">
            <img class="tool-icon" src="/brush.svg" width="24" height="24" alt="" draggable="false" aria-hidden="true" />
            <span class="sr-only">Calligraphy brush</span>
          </button>
          <button type="button" class="tool-btn" data-tool="eraser" title="Eraser">
            <img class="tool-icon" src="/eraser.svg" width="24" height="24" alt="" draggable="false" aria-hidden="true" />
            <span class="sr-only">Eraser</span>
          </button>
        </div>
        <span class="toolbar-divider" role="separator" aria-hidden="true"></span>
        <div class="tool-group colors" role="group" aria-label="Colors">
          <button type="button" class="swatch active" data-color="#2a4a7c" style="--c: #2a4a7c" title="Blue"></button>
          <button type="button" class="swatch" data-color="#c45c7a" style="--c: #c45c7a" title="Rose"></button>
          <button type="button" class="swatch" data-color="#2d6b3e" style="--c: #2d6b3e" title="Green"></button>
          <button type="button" class="swatch" data-color="#c9a227" style="--c: #c9a227" title="Gold"></button>
          <button type="button" class="swatch" data-color="#c45a2c" style="--c: #c45a2c" title="Orange"></button>
          <label class="swatch swatch-custom" title="Custom color">
            <input type="color" id="color-custom" value="#2a4a7c" />
          </label>
        </div>
      </div>
      <span class="toolbar-divider toolbar-divider--section" role="separator" aria-hidden="true"></span>
      <div class="toolbar-secondary">
        <div class="tool-group actions" role="group" aria-label="Doodles and export">
          <button type="button" class="icon-btn" id="btn-undo" title="Undo last stroke">
            <svg class="tool-icon tool-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 14L4 9l5-5M4 9h10.5a4.5 4.5 0 010 9H11" />
            </svg>
            <span class="icon-btn__text">Undo</span>
          </button>
          <button type="button" class="icon-btn" id="btn-clear-doodles" title="Clear all doodles">
            <svg class="tool-icon tool-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span class="icon-btn__text">Clear</span>
          </button>
          <button type="button" class="icon-btn icon-btn--primary" id="btn-pdf-out" title="Export canvas as PDF">
            <svg class="tool-icon tool-icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 14l5-5m0 0l5 5m-5-5v12" />
            </svg>
            <span class="icon-btn__text">Export</span>
          </button>
        </div>
      </div>
    </nav>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
